<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#f8fafc" />
    <title>JacobIQ</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #f8fafc;
        color: #0f172a;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      input, select, button, textarea { font-family: inherit; }
      ::selection { background: rgba(139, 92, 246, 0.2); }
      ::-webkit-scrollbar { height: 6px; width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
      @keyframes gradient { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
      .fade-in { animation: fadeIn 0.3s ease-out; }

      /* ── Global Button Animations ── */
      .btn-press { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1) !important; }
      .btn-press:hover { transform: translateY(-1px); }
      .btn-press:active { transform: translateY(1px) scale(0.97); }

      .btn-glow:hover { box-shadow: 0 4px 20px rgba(139, 92, 246, 0.25) !important; }
      .btn-glow:active { box-shadow: 0 2px 8px rgba(139, 92, 246, 0.15) !important; }

      /* Ripple effect on click */
      .btn-ripple { position: relative; overflow: hidden; }
      .btn-ripple::after {
        content: ''; position: absolute; inset: 0;
        background: radial-gradient(circle at var(--ripple-x, 50%) var(--ripple-y, 50%), rgba(255,255,255,0.3) 0%, transparent 60%);
        opacity: 0; transition: opacity 0.4s;
      }
      .btn-ripple:active::after { opacity: 1; transition: opacity 0s; }

      /* Tab slide indicator */
      @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes bounceIn { 0% { transform: scale(0.5); opacity: 0; } 60% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
      @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      @keyframes shimmerBg {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      /* Floating action button bounce */
      .fab-bounce:hover { animation: fabPulse 0.6s ease-in-out; }
      @keyframes fabPulse {
        0% { transform: scale(1); }
        30% { transform: scale(1.15); }
        60% { transform: scale(0.95); }
        100% { transform: scale(1.05); }
      }

      /* Success flash */
      @keyframes successFlash {
        0% { background-color: rgba(34,197,94,0.15); }
        100% { background-color: transparent; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
